server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }

  # Cache static assets
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri /index.html;
  }
}
